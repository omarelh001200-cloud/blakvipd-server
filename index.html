<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlakVipD - تحميل الفيديوهات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-download"></i>
                <span>BlakVipD</span>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav-tabs">
            <button class="nav-btn active" data-tab="downloads">
                <i class="fas fa-cloud-download-alt"></i>
                <span>التحميلات</span>
            </button>
            <button class="nav-btn" data-tab="library">
                <i class="fas fa-folder-open"></i>
                <span>المكتبة</span>
            </button>
            <button class="nav-btn" data-tab="more">
                <i class="fas fa-ellipsis-h"></i>
                <span>المزيد</span>
            </button>
        </nav>

        <!-- Downloads Tab -->
        <section class="tab-content active" id="downloads-tab">
            <div class="download-card">
                <h2><i class="fas fa-link"></i> ألصق رابط الفيديو</h2>
                <input type="url" id="urlInput" placeholder="https://example.com/video.mp4" class="url-input">

                <div class="format-selector">
                    <label class="format-option">
                        <input type="radio" name="format" value="mp4" checked>
                        <span class="format-box">
                            <i class="fas fa-video"></i>
                            MP4
                        </span>
                    </label>
                    <label class="format-option">
                        <input type="radio" name="format" value="mp3">
                        <span class="format-box">
                            <i class="fas fa-music"></i>
                            MP3
                        </span>
                    </label>
                </div>

                <button id="downloadBtn" class="download-btn">
                    <i class="fas fa-download"></i>
                    <span>تحميل</span>
                </button>

                <div class="progress-container" id="progressContainer" style="display:none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progressPercent">0%</span>
                        <span id="progressSpeed">0 KB/s</span>
                    </div>
                    <div class="status-text" id="statusText">جاري التحميل...</div>
                </div>
            </div>

            <!-- Active Downloads List -->
            <div class="downloads-list" id="downloadsList"></div>
        </section>

        <!-- Library Tab -->
        <section class="tab-content" id="library-tab">
            <div class="library-header">
                <h2><i class="fas fa-folder-open"></i> الملفات المحملة</h2>
                <button class="clear-btn" id="clearBtn" style="display:none;">
                    <i class="fas fa-trash"></i> مسح الكل
                </button>
            </div>
            <div class="library-grid" id="libraryGrid"></div>
            <div class="empty-state" id="emptyState">
                <i class="fas fa-inbox"></i>
                <p>لا توجد تحميلات بعد</p>
            </div>
        </section>

        <!-- More Tab -->
        <section class="tab-content" id="more-tab">
            <div class="settings-card">
                <h2><i class="fas fa-cog"></i> الإعدادات</h2>

                <div class="setting-item">
                    <span>المسار الافتراضي</span>
                    <span class="setting-value" id="downloadPath">التنزيلات</span>
                </div>

                <div class="setting-item">
                    <span>الإصدار</span>
                    <span class="setting-value">1.0.0</span>
                </div>

                <div class="setting-item">
                    <span>الوضع الليلي</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="about-card">
                <h2><i class="fas fa-info-circle"></i> عن التطبيق</h2>
                <p>BlakVipD - أداة تحميل الفيديوهات والملفات من الإنترنت بسهولة وسرعة.</p>
            </div>
        </section>
    </div>

    <!-- Video Player Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="videoTitle">فيديو</span>
                <button class="close-btn" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <video id="videoPlayer" controls></video>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
